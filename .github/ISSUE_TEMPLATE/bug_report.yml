name: 🐛 Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve CertPath AI! Please search existing issues first.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I generated a roadmap, the days were out of order…
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: AI provider (if relevant)
      options:
        - Not relevant / offline feature
        - Groq
        - Grok (xAI)
        - Other
  - type: input
    id: env
    attributes:
      label: Browser & OS
      placeholder: Chrome 126 on Windows 11
  - type: textarea
    id: console
    attributes:
      label: Console errors
      description: Paste any errors from the browser devtools console.
      render: shell
